<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <title>Physics Sim</title>
  </head>
  <canvas class="w-screen h-screen"></canvas>
  <body>
    <script type="module">
      import * as THREE from 'https://esm.sh/three'
      import { PointerLockControls } from 'https://esm.sh/three/examples/jsm/controls/PointerLockControls.js'

      // Init
      window.THREE = THREE
      const v3 = (x = 0, y = x, z = x) => new THREE.Vector3(x, y, z)
      const canvas = document.querySelector('canvas')
      const renderer = new THREE.WebGLRenderer({ canvas })
      renderer.setClearColor('#ffffff')
      const scene = new THREE.Scene()

      const timer = new THREE.Timer()
      timer.connect(document)

      const camera = new THREE.PerspectiveCamera(
        75,
        innerWidth / innerHeight,
        0.1,
        200,
      )
      const controls = new PointerLockControls(camera, canvas)

      canvas.addEventListener('mousedown', (e) => {
        controls.lock()
      })

      canvas.addEventListener('mouseup', (e) => {
        controls.unlock()
      })

      // Scene setup
      const geometry = new THREE.BoxGeometry(1, 1, 1)
      const material = new THREE.MeshBasicMaterial({ color: 0x00ff00 })
      const cube = new THREE.Mesh(geometry, material)
      scene.add(cube)

      const cubeloader = new THREE.CubeTextureLoader().setPath('img/skybox/')
      const skybox = cubeloader.load([
        'right.bmp', // px
        'left.bmp', // nx
        'top.bmp', // py
        'bottom.bmp', // ny
        'front.bmp', // pz
        'back.bmp', // nz
      ])
      scene.background = skybox

      // Rendering
      function animate(time) {
        timer.update(time)
        const dt = timer.getDelta()
        renderer.render(scene, camera)
      }
      renderer.setAnimationLoop(animate)

      new ResizeObserver(() => {
        renderer.setSize(canvas.clientWidth, canvas.clientHeight, false)
        camera.aspect = canvas.clientWidth / canvas.clientHeight
        camera.updateProjectionMatrix()
      }).observe(canvas)
    </script>
  </body>
</html>
