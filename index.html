<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <title>Physics Sim</title>
  </head>
</html>

<!-- <h1
    class="bg-gray-900 inline-block text-white px-2 py-1 pr-2.5 pb-1.5 rounded-br-md text-sm"
  >
    <span class="font-medium">Physics Sim</span> v1.0

<details
  open
  class="fixed top-4 right-4 min-h-10 bg-gray-900/60 rounded-sm text-white p-2 backdrop-blur-md space-y-1"
>
  <summary>Controls</summary>
  <section id="basic-test" class="space-y-1">
    <h1
      class="text-xs text-center bg-gray-900/50 -mx-2 p-1 font-bold uppercase font-mono"
    >
      Basic Test (y direction)
    </h1>
    <label class="flex justify-between"
      >Position
      <input
        class="ms-2 bg-gray-900/70 px-2 rounded-sm w-[10ch] box-content"
        type="number"
        value="0.00"
      />
    </label>
    <label class="flex justify-between"
      >Velocity
      <input
        class="ms-2 bg-gray-900/70 px-2 rounded-sm w-[10ch] box-content"
        type="number"
        value="0.00"
      />
    </label>
    <label class="flex justify-between"
      >Acceleration
      <input
        class="ms-2 bg-gray-900/70 px-2 rounded-sm w-[10ch] box-content"
        type="number"
        value="0.00"
      />
    </label>
    <label class="flex justify-between"
      >Jerk
      <input
        class="ms-2 bg-gray-900/70 px-2 rounded-sm w-[10ch] box-content"
        type="number"
        value="0.00"
      />
    </label>
    <label class="flex justify-between"
      >Snap
      <input
        class="ms-2 bg-gray-900/70 px-2 rounded-sm w-[10ch] box-content"
        type="number"
        value="0.00"
      />
    </label>
    <label class="flex justify-between"
      >Crackle
      <input
        class="ms-2 bg-gray-900/70 px-2 rounded-sm w-[10ch] box-content"
        type="number"
        value="0.00"
      />
    </label>
    <label class="flex justify-between"
      >Pop
      <input
        class="ms-2 bg-gray-900/70 px-2 rounded-sm w-[10ch] box-content"
        type="number"
        value="0.00"
      />
    </label>
    <button
      id="reset"
      class="block text-center bg-gray-900/70 rounded-sm w-full"
    >
      Reset All
    </button>
  </section>
</details>
<canvas class="fixed inset-0 w-full h-full -z-1"></canvas>
<script type="module">
  import * as THREE from 'https://esm.sh/three'
  import { PointerLockControls } from 'https://esm.sh/three/examples/jsm/controls/PointerLockControls.js'

  // Init
  window.THREE = THREE
  const v3 = (x = 0, y = x, z = x) => new THREE.Vector3(x, y, z)
  const canvas = document.querySelector('canvas')
  const renderer = new THREE.WebGLRenderer({ canvas })
  renderer.setClearColor('#ffffff')
  const scene = new THREE.Scene()
  const timer = new THREE.Timer()
  timer.connect(document)

  const camera = new THREE.PerspectiveCamera(
    75,
    innerWidth / innerHeight,
    0.1,
    200,
  )
  window.camera = camera
  camera.position.set(4, 2, 4)
  camera.lookAt(0, 1, 0)
  const controls = new PointerLockControls(camera, canvas)
  canvas.addEventListener('mousedown', (e) => {
    controls.lock()
  })
  canvas.addEventListener('mouseup', (e) => {
    controls.unlock()
  })

  const input = {
    w: false,
    a: false,
    s: false,
    d: false,
    q: false,
    e: false,
    shift: false,

    get vector() {},
  }

  addEventListener('keydown', (e) => {
    const key = e.key.toLowerCase()
    if (key in input) input[key] = true
  })

  addEventListener('keyup', (e) => {
    const key = e.key.toLowerCase()
    if (key in input) input[key] = false
  })

  // Scene setup
  const tex = new THREE.TextureLoader()

  const geometry = new THREE.SphereGeometry(1)
  const material = new THREE.MeshMatcapMaterial({
    matcap: tex.load('img/matcap-porcelain-white.jpg'),
  })
  const object = new THREE.Mesh(geometry, material)
  scene.add(object)

  const cubeloader = new THREE.CubeTextureLoader().setPath('img/skybox/')
  const skybox = cubeloader.load([
    'right.bmp', // px
    'left.bmp', // nx
    'top.bmp', // py
    'bottom.bmp', // ny
    'front.bmp', // pz
    'back.bmp', // nz
  ])
  scene.background = skybox

  const grid = new THREE.GridHelper(50, 20, '#eee', '#abc')
  grid.position.y = -0.5
  scene.add(grid)

  // Loop
  const data = new Array(7).fill(0)

  data.inputs = Array.from(document.querySelectorAll('#basic-test input'))
  data.inputs.forEach((input, i) => {
    input.value = data[i].toFixed(2)
    input.addEventListener('change', (e) => {
      input.value = parseFloat(input.value).toFixed(2)
      data[i] = parseFloat(input.value)
      console.log(data)
    })
  })

  data.reset = document.querySelector('#basic-test #reset')
  data.reset.addEventListener('click', (e) => {
    data.fill(0)
  })

  const normal_speed = 5
  const sprint_speed = 10

  const clamp_range = {
    max: 20,
    min: 0,
  }

  function animate(time) {
    timer.update(time)
    const dt = timer.getDelta()

    const speed = input.shift ? sprint_speed : normal_speed
    const move = speed * dt

    if (input.w) camera.translateZ(-move)
    if (input.s) camera.translateZ(move)

    if (input.a) camera.translateX(-move)
    if (input.d) camera.translateX(move)

    if (input.q) camera.translateY(-move)
    if (input.e) camera.translateY(move)

    for (let i = data.length - 1; i > 0; i--) {
      data[i - 1] += data[i] * dt
    }
    // data[0] = data[0] % 20
    if (data[0] < clamp_range.min) data[0] = clamp_range.max
    else if (data[0] > clamp_range.max) data[0] = clamp_range.min
    // console.log(data)

    data.inputs.forEach((input, i) => {
      if (document.activeElement !== input && input.value != data[i]) {
        input.value = data[i].toFixed(2)
      }
    })

    object.position.y = data[0]

    renderer.render(scene, camera)
  }
  renderer.setAnimationLoop(animate)

  new ResizeObserver(() => {
    renderer.setSize(canvas.clientWidth, canvas.clientHeight, false)
    camera.aspect = canvas.clientWidth / canvas.clientHeight
    camera.updateProjectionMatrix()
  }).observe(canvas)
</script>
